name: build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  docker-compose-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ham-callbook-backend:${{ gitea.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ham-callbook-frontend:${{ gitea.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config

      - name: Report success
        run: |
          echo "Backend image:  ham-callbook-backend:${{ gitea.sha }}"
          echo "Frontend image: ham-callbook-frontend:${{ gitea.sha }}"
          echo "Compose stack validated."
