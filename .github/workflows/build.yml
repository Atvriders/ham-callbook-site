name: build

# Builds the three service images and pushes them to GitHub Container
# Registry (GHCR) so the docker-compose stack can pull them with:
#   REGISTRY=ghcr.io/atvriders docker compose pull && \
#   REGISTRY=ghcr.io/atvriders docker compose up -d
#
# Note: a fork's very first GHCR build may need a manual run via the
# "Run workflow" button (workflow_dispatch) before package publishing is
# enabled. Packages publish public by default for this org.

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: atvriders
  IMAGE_BACKEND: ham-callbook-backend
  IMAGE_FRONTEND: ham-callbook-frontend
  IMAGE_CADDY: ham-callbook-caddy

jobs:
  docker-compose-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      - name: Build & push caddy image (Caddyfile baked in)
        uses: docker/build-push-action@v5
        with:
          context: ./caddy
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_CADDY }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_CADDY }}:${{ github.sha }}

      - name: Validate docker-compose.yml resolves against GHCR
        env:
          REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}
        run: docker compose -f docker-compose.yml config

      - name: Summary
        run: |
          echo "Backend:  ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_BACKEND }}:latest"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_FRONTEND }}:latest"
          echo "Caddy:    ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_CADDY }}:latest"
          echo ""
          echo "Pull with:  REGISTRY=ghcr.io/atvriders docker compose pull"

  # Optional self-contained backend with the archive DB baked in (~3 GB image).
  # Runs in parallel; the data layer is cached in the registry so it is only
  # downloaded once, not on every code change.
  backend-full:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space for the ~3 GB image
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend-full (DB baked in)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.full
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_BACKEND }}-full:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_BACKEND }}-full:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_BACKEND }}-full:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_BACKEND }}-full:buildcache,mode=max
