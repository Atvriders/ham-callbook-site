# Production-style compose: pulls pre-built images from a container registry.
#
# Registry is selectable via ${REGISTRY} (default = GitHub Container Registry):
#   default (GHCR):    docker compose pull && docker compose up -d
#   Gitea registry:    REGISTRY=git.waterburp.com/atvriders docker compose pull && \
#                      REGISTRY=git.waterburp.com/atvriders docker compose up -d
# For local dev with source rebuilds, use docker-compose.dev.yml.
services:
  backend:
    image: ${REGISTRY:-ghcr.io/atvriders}/ham-callbook-backend:${TAG:-latest}
    environment:
      DB_PATH: /data/USA_Ham_Callbooks.sqlite
      ULS_JSON_PATH: /data/uls.json
      ULS_HISTORY_PATH: /data/uls_history.json
      # Wave 1-4 precomputed artifacts (all live in the ./data mount):
      LEADERBOARDS_PATH: /data/leaderboards.json
      EDITION_DIFF_PATH: /data/edition_diff.json
      DEFUNCT_CLUBS_PATH: /data/defunct_clubs.json
      PRINTED_LINEAGE_PATH: /data/printed_lineage.json
      PHONETIC_INDEX_PATH: /data/phonetic_index.json
      ADDRESS_CLUSTERS_DB_PATH: /data/address_clusters.sqlite
      HOUSEHOLDS_PATH: /data/households.json
      COHORTS_PATH: /data/cohorts.json
      NAME_TRENDS_PATH: /data/name_trends.json
      DATA_PORTAL_MANIFEST_PATH: /data/downloads/MANIFEST.json
      DATA_PORTAL_DOWNLOADS_PATH: /data/downloads
      # Corrections desk writable store. Lives on its OWN writable volume,
      # NOT inside the read-only ./data mount — SQLite must be able to create
      # the submissions -wal/-shm sidecars, which a read-only dir forbids.
      SUBMISSIONS_DB_PATH: /srv/submissions/submissions.sqlite
    volumes:
      # Archive data is mounted read-only. The image opens the (WAL-mode) DB
      # with an immutable fallback so read-only mounts work; if you are on an
      # older image and hit "container unhealthy", drop the ":ro".
      - ./data:/data:ro
      # Writable named volume for the corrections store (Docker owns perms, so
      # no file-vs-directory or uid gotchas). Do NOT bind-mount a single file.
      - submissions_data:/srv/submissions
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ${REGISTRY:-ghcr.io/atvriders}/ham-callbook-frontend:${TAG:-latest}
    environment:
      NEXT_PUBLIC_API_BASE: /api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: ${REGISTRY:-ghcr.io/atvriders}/ham-callbook-caddy:${TAG:-latest}
    ports:
      # Site lands on host port 3017 (per-app port scheme; avoids grabbing
      # the host's 80/443). Override with SITE_PORT=80 for a dedicated host.
      - "${SITE_PORT:-3017}:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  submissions_data:
