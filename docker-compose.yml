# Production-style compose: pulls pre-built images from a container registry.
#
# SELF-CONTAINED: `docker compose up -d` works with no manual data handling —
# the data-init service downloads the ~3 GB archive into a named volume on the
# first run (the DB is too big for git/the images). Subsequent runs skip it.
#
# Registry is selectable via ${REGISTRY} (default = GitHub Container Registry):
#   default (GHCR):    docker compose up -d
#   Gitea registry:    REGISTRY=git.waterburp.com/atvriders docker compose up -d
# For local dev with source rebuilds, use docker-compose.dev.yml.
services:
  # One-shot bootstrap: populate the app_data volume with the archive data the
  # first time (DB ~1.4 GB gzipped + feature artifacts). Idempotent — if the DB
  # is already in the volume it exits immediately. Pin DATA_TAG to a release.
  data-init:
    image: alpine:3.20
    environment:
      DATA_BASE: "https://github.com/Atvriders/ham-callbook-site/releases/download/${DATA_TAG:-data-v2}"
    volumes:
      - app_data:/data
    command:
      - sh
      - -ec
      - |
        # Re-download when the release tag changes: the marker records which
        # DATA_BASE the volume was populated from. Same tag -> skip; new tag -> refresh.
        if [ -f /data/USA_Ham_Callbooks.sqlite ] && [ "$$(cat /data/.data_base 2>/dev/null)" = "$$DATA_BASE" ]; then
          echo "[data-init] data for $$DATA_BASE already present — skipping download."; exit 0
        fi
        apk add --no-cache curl >/dev/null
        echo "[data-init] downloading database (~860 MB gz, one time)…"
        curl -fSL "$$DATA_BASE/USA_Ham_Callbooks.sqlite.gz" -o /data/db.gz
        echo "[data-init] extracting database…"
        # Extract to a temp name and rename only on success, so an interrupted
        # run never leaves a partial DB under the real name (which the gate
        # check above would then wrongly treat as 'present').
        gunzip -c /data/db.gz > /data/db.partial && mv /data/db.partial /data/USA_Ham_Callbooks.sqlite
        rm -f /data/db.gz
        echo "[data-init] downloading feature artifacts…"
        curl -fSL "$$DATA_BASE/callbook-artifacts.tar.gz" -o /data/art.tgz
        tar xzf /data/art.tgz -C /data && rm -f /data/art.tgz
        echo "$$DATA_BASE" > /data/.data_base
        echo "[data-init] data ready: $$(ls /data | wc -l) items."
    restart: "no"

  backend:
    image: ${REGISTRY:-ghcr.io/atvriders}/ham-callbook-backend:${TAG:-latest}
    environment:
      DB_PATH: /data/USA_Ham_Callbooks.sqlite
      ULS_JSON_PATH: /data/uls.json
      ULS_HISTORY_PATH: /data/uls_history.json
      # Wave 1-4 precomputed artifacts (all live in the ./data mount):
      LEADERBOARDS_PATH: /data/leaderboards.json
      EDITION_DIFF_PATH: /data/edition_diff.json
      DEFUNCT_CLUBS_PATH: /data/defunct_clubs.json
      PRINTED_LINEAGE_PATH: /data/printed_lineage.json
      PHONETIC_INDEX_PATH: /data/phonetic_index.json
      ADDRESS_CLUSTERS_DB_PATH: /data/address_clusters.sqlite
      HOUSEHOLDS_PATH: /data/households.json
      COHORTS_PATH: /data/cohorts.json
      NAME_TRENDS_PATH: /data/name_trends.json
      DATA_PORTAL_MANIFEST_PATH: /data/downloads/MANIFEST.json
      DATA_PORTAL_DOWNLOADS_PATH: /data/downloads
      # Corrections desk writable store. Lives on its OWN writable volume,
      # NOT inside the read-only ./data mount — SQLite must be able to create
      # the submissions -wal/-shm sidecars, which a read-only dir forbids.
      SUBMISSIONS_DB_PATH: /srv/submissions/submissions.sqlite
    volumes:
      # Archive data, auto-populated by data-init, mounted read-only. The image
      # opens the (WAL-mode) DB with an immutable fallback so :ro works.
      # To use your OWN data instead, replace this with a bind mount:
      #   - /path/to/your/data:/data:ro
      - app_data:/data:ro
      # Writable named volume for the corrections store (Docker owns perms, so
      # no file-vs-directory or uid gotchas). Do NOT bind-mount a single file.
      - submissions_data:/srv/submissions
    depends_on:
      data-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ${REGISTRY:-ghcr.io/atvriders}/ham-callbook-frontend:${TAG:-latest}
    environment:
      NEXT_PUBLIC_API_BASE: /api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: ${REGISTRY:-ghcr.io/atvriders}/ham-callbook-caddy:${TAG:-latest}
    ports:
      # Site lands on host port 3017 (per-app port scheme; avoids grabbing
      # the host's 80/443). Override with SITE_PORT=80 for a dedicated host.
      - "${SITE_PORT:-3017}:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  submissions_data:
  app_data:
