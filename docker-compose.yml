services:
  data-init:
    image: alpine:3.20
    environment:
      DATA_BASE: "https://github.com/Atvriders/ham-callbook-site/releases/download/${DATA_TAG:-data-v8}"
    volumes:
      - app_data:/data
    command:
      - sh
      - -ec
      - |
        if [ -f /data/USA_Ham_Callbooks.sqlite ] && [ "$$(cat /data/.data_base 2>/dev/null)" = "$$DATA_BASE" ]; then
          echo "[data-init] data for $$DATA_BASE already present — skipping download."; exit 0
        fi
        apk add --no-cache curl >/dev/null
        echo "[data-init] downloading database (~1.2 GB gz, one time)…"
        curl -fSL "$$DATA_BASE/USA_Ham_Callbooks.sqlite.gz" -o /data/db.gz
        echo "[data-init] extracting database…"
        gunzip -c /data/db.gz > /data/db.partial && mv /data/db.partial /data/USA_Ham_Callbooks.sqlite
        rm -f /data/db.gz
        echo "[data-init] downloading feature artifacts…"
        curl -fSL "$$DATA_BASE/callbook-artifacts.tar.gz" -o /data/art.tgz
        tar xzf /data/art.tgz -C /data && rm -f /data/art.tgz
        echo "$$DATA_BASE" > /data/.data_base
        echo "[data-init] data ready: $$(ls /data | wc -l) items."
    restart: "no"

  backend:
    image: ${REGISTRY:-ghcr.io/atvriders}/ham-callbook-backend:${TAG:-latest}
    environment:
      DB_PATH: /data/USA_Ham_Callbooks.sqlite
      ULS_JSON_PATH: /data/uls.json
      ULS_HISTORY_PATH: /data/uls_history.json
      LEADERBOARDS_PATH: /data/leaderboards.json
      EDITION_DIFF_PATH: /data/edition_diff.json
      DEFUNCT_CLUBS_PATH: /data/defunct_clubs.json
      PRINTED_LINEAGE_PATH: /data/printed_lineage.json
      PHONETIC_INDEX_PATH: /data/phonetic_index.json
      ADDRESS_CLUSTERS_DB_PATH: /data/address_clusters.sqlite
      HOUSEHOLDS_PATH: /data/households.json
      COHORTS_PATH: /data/cohorts.json
      NAME_TRENDS_PATH: /data/name_trends.json
      DATA_PORTAL_MANIFEST_PATH: /data/downloads/MANIFEST.json
      DATA_PORTAL_DOWNLOADS_PATH: /data/downloads
      SUBMISSIONS_DB_PATH: /srv/submissions/submissions.sqlite
    volumes:
      - app_data:/data:ro
      - submissions_data:/srv/submissions
    depends_on:
      data-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ${REGISTRY:-ghcr.io/atvriders}/ham-callbook-frontend:${TAG:-latest}
    environment:
      NEXT_PUBLIC_API_BASE: /api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: ${REGISTRY:-ghcr.io/atvriders}/ham-callbook-caddy:${TAG:-latest}
    ports:
      - "${SITE_PORT:-3017}:80"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  submissions_data:
  app_data:
